<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="signup-body">
    <div class="signup-container">
        <div class="logo">
            <h1 style="color: #FFFC00; font-size: 48px; font-weight: bold;">snapchat</h1>
        </div>

        <form class="signup-form" onsubmit="return validateSignup()">
            <div class="form-row">
                <div class="form-group half">
                    <label>First Name</label>
                    <input type="text" id="fname" class="form-input" placeholder="First name" required>
                </div>
                <div class="form-group half">
                    <label>Last Name</label>
                    <input type="text" id="lname" class="form-input" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="cpass" class="form-input" placeholder="Repeat password" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" class="form-input" placeholder="09XX-XXX-XXXX" required>
            </div>

            <button type="submit" class="btn signup-btn">SIGN UP</button>
            <p class="switch-page">Already have an account? <a href="index.html">Log In</a></p>
        </form>
    </div>

    <script>
        function validateSignup() {
            let fname = document.getElementById('fname').value.trim();
            let lname = document.getElementById('lname').value.trim();
            let email = document.getElementById('email').value.trim();
            let pass = document.getElementById('password').value.trim();
            let cpass = document.getElementById('cpass').value.trim();
            let mobile = document.getElementById('mobile').value.trim();

            if (!fname || !lname || !email || !pass || !cpass || !mobile) {
                alert("All fields are required!");
                return false;
            }
            if (pass !== cpass) {
                alert("Passwords do NOT match!");
                return false;
            }
            if (pass.length < 6) {
                alert("Password must be at least 6 characters!");
                return false;
            }
            if (!/^\d{10,11}$/.test(mobile.replace(/[- ]/g, ''))) {
                alert("Enter a valid mobile number!");
                return false;
            }
            alert("Account created successfully!");
            return true;
        }
    </script>
</body>
</html>
